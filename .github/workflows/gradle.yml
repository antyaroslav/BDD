name: Java CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start app
        run: |
          nohup java -jar artifacts/app-ibank-build-for-testers.jar > app.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:9999 >/dev/null; then
              echo "Application is up"
              exit 0
            fi
            sleep 1
          done
          echo "Application failed to start"
          cat app.log
          exit 1

      - name: Run tests
        run: ./gradlew clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/reports/problems
            app.log
